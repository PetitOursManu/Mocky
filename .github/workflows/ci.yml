name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: build · test · smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20 # matches the Dockerfile's node:20-slim
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run smoke

  docker:
    name: docker build (no push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Build the multi-stage image only (no push) to catch Dockerfile drift.
      - run: docker build -t mocky:ci .
